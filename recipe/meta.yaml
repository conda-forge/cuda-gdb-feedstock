{% set name = "cuda-gdb" %}
{% set version = "13.1.115" %}
{% set cuda_version = "13.1" %}
{% set platform = "linux-x86_64" %}  # [linux64]
{% set platform = "linux-ppc64le" %}  # [ppc64le]
{% set platform = "linux-sbsa" %}  # [aarch64]

package:
  name: cuda-gdb
  version: {{ version }}

source:
  - url: https://github.com/NVIDIA/cuda-gdb/archive/cuda-toolkit-{{ cuda_version }}-release.tar.gz
    sha256: 29d62f09e5b135497c7f139abf0db136f05697e86e3785f33b1c3c0f26456ea1

  - url: https://developer.download.nvidia.com/compute/cuda/redist/cuda_gdb/{{ platform }}/cuda_gdb-{{ platform }}-{{ version }}-archive.tar.xz
    sha256: bc514f7fae45a91c3d1750bd1e353d237fa4f140a1ebc209c9e3da6d68197248  # [linux64]
    sha256: d00656f12034fc5ed7ceb93d61a6ed6a01fa7118ae65d0a28495f529f9674aaa  # [aarch64]
    folder: binary

build:
  number: 1
  # gdb version bundled (14.1) does not support py>=3.12
  skip: true  # [osx or win or ppc64le or py<312]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cuda-nvcc_{{ target_platform }} {{ cuda_version }}.*
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - gnuconfig  # [unix]
    - make >=3.82
    - pkg-config
    - bison
  host:
    - python
    - ncurses
    - texinfo
    - liblzma-devel
    - zlib
    - readline
    - libiconv
    - gmp
    - mpfr
    - zstd
    - cuda-version {{ cuda_version }}
  run:
    - python
    - ncurses
    - liblzma-devel
    - zlib
    - zstd
    - six
    - libiconv
    - pygments
    - {{ pin_compatible("cuda-version", max_pin="x.x") }}
    # for gdbinit files
    - gdb

test:
  commands:
    - test -f $PREFIX/bin/cuda-gdb
    - test -f $PREFIX/bin/cuda-gdbserver
    - test -d $PREFIX/share/cuda-gdb/syscalls
    - test -d $PREFIX/share/cuda-gdb/system-gdbinit

about:
  home: https://developer.nvidia.com/cuda-toolkit
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: CUDA-GDB is the NVIDIA tool for debugging CUDA applications
  description: |
    CUDA-GDB is the NVIDIA tool for debugging CUDA applications running on Linux.
    CUDA-GDB is an extension to the x86-64 port of GDB, the GNU Project debugger.
  doc_url: https://docs.nvidia.com/cuda/cuda-gdb/index.html

extra:
  recipe-maintainers:
    - conda-forge/cuda
    - isuruf
  feedstock-name: cuda-gdb
